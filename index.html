<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Kelly's Drawing Studio</title>
  <style>
    :root{
      --bg:#eef7ff;
      --panel:#ffffff;
      --ink:#152238;
      --accent:#2f80ed;
      --shadow:0 10px 30px rgba(21,34,56,.14);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      font-family:Arial,Helvetica,sans-serif;
      background:linear-gradient(135deg,#eaf7ff,#fff4fb);
      color:var(--ink);
      touch-action:none;
    }
    body{display:flex;align-items:center;justify-content:center}
    .app{
      width:100vw;
      height:100vh;
      display:grid;
      grid-template-rows:auto 1fr auto;
      gap:10px;
      padding:10px;
    }
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      background:rgba(255,255,255,.94);
      border-radius:20px;
      padding:10px 16px;
      box-shadow:var(--shadow);
      min-height:64px;
    }
    .title{
      font-size:clamp(20px,3vw,34px);
      font-weight:900;
      white-space:nowrap;
    }
    .subtitle{
      font-size:clamp(12px,1.7vw,18px);
      opacity:.7;
      text-align:right;
    }
    .workspace{
      min-height:0;
      display:grid;
      grid-template-columns:118px 1fr 118px;
      gap:10px;
    }
    .toolbar{
      background:rgba(255,255,255,.96);
      border-radius:20px;
      padding:10px;
      box-shadow:var(--shadow);
      display:flex;
      flex-direction:column;
      gap:9px;
      overflow:auto;
    }
    .tool-label{
      text-align:center;
      font-size:13px;
      font-weight:800;
      opacity:.65;
      margin-top:2px;
    }
    .tool, .color, .stamp{
      border:0;
      border-radius:15px;
      min-height:54px;
      background:#edf3fa;
      color:var(--ink);
      font-size:26px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 4px 0 rgba(21,34,56,.12);
    }
    .tool:active,.color:active,.stamp:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(21,34,56,.12)}
    .tool.active,.stamp.active{outline:4px solid var(--accent);background:#dcecff}
    .color{
      min-height:48px;
      border:4px solid white;
      outline:2px solid rgba(21,34,56,.14);
    }
    .color.active{outline:5px solid #152238}
    .canvas-wrap{
      position:relative;
      min-width:0;
      min-height:0;
      border-radius:22px;
      overflow:hidden;
      background:#fff;
      box-shadow:var(--shadow);
      border:4px solid rgba(47,128,237,.25);
    }
    canvas{
      width:100%;
      height:100%;
      display:block;
      background:white;
      touch-action:none;
      cursor:crosshair;
    }
    .hint{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:none;
      font-size:clamp(24px,4vw,48px);
      font-weight:900;
      color:rgba(21,34,56,.15);
      text-align:center;
      padding:20px;
    }
    .bottom{
      background:rgba(255,255,255,.95);
      border-radius:18px;
      padding:9px 14px;
      box-shadow:var(--shadow);
      display:flex;
      justify-content:center;
      align-items:center;
      gap:12px;
      min-height:54px;
      font-weight:800;
      font-size:clamp(13px,1.7vw,18px);
    }
    .size-row{display:flex;gap:6px}
    .size{
      flex:1;
      min-height:42px;
      border:0;
      border-radius:12px;
      background:#edf3fa;
      font-weight:900;
      font-size:16px;
    }
    .size.active{outline:4px solid var(--accent);background:#dcecff}
    @media (max-width:700px){
      .workspace{grid-template-columns:88px 1fr 88px}
      .toolbar{padding:7px;gap:7px}
      .tool,.stamp{min-height:48px;font-size:22px}
      .color{min-height:42px}
      .subtitle{display:none}
    }
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="title">🎨 Kelly's Drawing Studio</div>
    <div class="subtitle">Draw, erase, stamp, and create!</div>
  </div>

  <div class="workspace">
    <div class="toolbar">
      <div class="tool-label">Colours</div>
      <button class="color active" data-color="#111111" style="background:#111111"></button>
      <button class="color" data-color="#ff3b30" style="background:#ff3b30"></button>
      <button class="color" data-color="#ff9500" style="background:#ff9500"></button>
      <button class="color" data-color="#ffd60a" style="background:#ffd60a"></button>
      <button class="color" data-color="#34c759" style="background:#34c759"></button>
      <button class="color" data-color="#007aff" style="background:#007aff"></button>
      <button class="color" data-color="#af52de" style="background:#af52de"></button>
      <button class="color" data-color="#ff2d95" style="background:#ff2d95"></button>

      <div class="tool-label">Brush Size</div>
      <div class="size-row">
        <button class="size" data-size="5">S</button>
        <button class="size active" data-size="12">M</button>
        <button class="size" data-size="24">L</button>
      </div>
    </div>

    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="canvas"></canvas>
      <div class="hint" id="hint">Draw something awesome!</div>
    </div>

    <div class="toolbar">
      <div class="tool-label">Tools</div>
      <button class="tool active" id="drawBtn" title="Draw">✏️</button>
      <button class="tool" id="eraserBtn" title="Eraser">🧽</button>
      <button class="tool" id="undoBtn" title="Undo">↶</button>
      <button class="tool" id="clearBtn" title="Clear">🗑️</button>

      <div class="tool-label">Stamps</div>
      <button class="stamp" data-stamp="⭐">⭐</button>
      <button class="stamp" data-stamp="❤️">❤️</button>
      <button class="stamp" data-stamp="😊">😊</button>
      <button class="stamp" data-stamp="🤖">🤖</button>
      <button class="stamp" data-stamp="🌈">🌈</button>
    </div>
  </div>

  <div class="bottom">
    Use one finger to draw • Tap a stamp, then tap the page
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d', { willReadFrequently:true });
  const wrap = document.getElementById('canvasWrap');
  const hint = document.getElementById('hint');

  let drawing = false;
  let color = '#111111';
  let size = 12;
  let mode = 'draw';
  let stamp = '';
  let history = [];
  let lastX = 0, lastY = 0;
  let hasDrawn = false;

  function resizeCanvas(){
    const old = document.createElement('canvas');
    old.width = canvas.width;
    old.height = canvas.height;
    old.getContext('2d').drawImage(canvas,0,0);

    const rect = wrap.getBoundingClientRect();
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    canvas.width = Math.floor(rect.width * dpr);
    canvas.height = Math.floor(rect.height * dpr);

    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    if(old.width && old.height){
      ctx.drawImage(old,0,0,old.width,old.height,0,0,rect.width,rect.height);
    }
  }

  function saveState(){
    if(history.length >= 20) history.shift();
    history.push(canvas.toDataURL());
  }

  function restoreState(data){
    const img = new Image();
    img.onload = () => {
      const rect = wrap.getBoundingClientRect();
      ctx.clearRect(0,0,rect.width,rect.height);
      ctx.drawImage(img,0,0,rect.width,rect.height);
    };
    img.src = data;
  }

  function pointFromEvent(e){
    const r = canvas.getBoundingClientRect();
    return { x:e.clientX-r.left, y:e.clientY-r.top };
  }

  function setMode(newMode){
    mode = newMode;
    document.querySelectorAll('.tool,.stamp').forEach(b=>b.classList.remove('active'));
    if(newMode==='draw') document.getElementById('drawBtn').classList.add('active');
    if(newMode==='erase') document.getElementById('eraserBtn').classList.add('active');
  }

  canvas.addEventListener('pointerdown', e => {
    e.preventDefault();
    const p = pointFromEvent(e);
    hint.style.display='none';
    hasDrawn = true;

    if(mode==='stamp'){
      saveState();
      ctx.save();
      ctx.font = `${Math.max(44,size*5)}px Arial`;
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.fillText(stamp,p.x,p.y);
      ctx.restore();
      return;
    }

    saveState();
    drawing = true;
    lastX = p.x;
    lastY = p.y;
    canvas.setPointerCapture(e.pointerId);
  });

  canvas.addEventListener('pointermove', e => {
    if(!drawing) return;
    e.preventDefault();
    const p = pointFromEvent(e);

    ctx.globalCompositeOperation = mode==='erase' ? 'destination-out' : 'source-over';
    ctx.strokeStyle = color;
    ctx.lineWidth = mode==='erase' ? size*2 : size;

    ctx.beginPath();
    ctx.moveTo(lastX,lastY);
    ctx.lineTo(p.x,p.y);
    ctx.stroke();

    lastX=p.x;
    lastY=p.y;
  });

  function stopDraw(){ drawing=false; }
  canvas.addEventListener('pointerup', stopDraw);
  canvas.addEventListener('pointercancel', stopDraw);
  canvas.addEventListener('pointerleave', stopDraw);

  document.querySelectorAll('.color').forEach(btn=>{
    btn.addEventListener('click',()=>{
      color=btn.dataset.color;
      document.querySelectorAll('.color').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      setMode('draw');
    });
  });

  document.querySelectorAll('.size').forEach(btn=>{
    btn.addEventListener('click',()=>{
      size=Number(btn.dataset.size);
      document.querySelectorAll('.size').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  document.getElementById('drawBtn').addEventListener('click',()=>setMode('draw'));
  document.getElementById('eraserBtn').addEventListener('click',()=>setMode('erase'));

  document.querySelectorAll('.stamp').forEach(btn=>{
    btn.addEventListener('click',()=>{
      stamp=btn.dataset.stamp;
      mode='stamp';
      document.querySelectorAll('.tool,.stamp').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  document.getElementById('undoBtn').addEventListener('click',()=>{
    if(!history.length) return;
    const state = history.pop();
    restoreState(state);
  });

  document.getElementById('clearBtn').addEventListener('click',()=>{
    saveState();
    const rect=wrap.getBoundingClientRect();
    ctx.clearRect(0,0,rect.width,rect.height);
    hint.style.display='flex';
    hasDrawn=false;
  });

  new ResizeObserver(resizeCanvas).observe(wrap);
  resizeCanvas();
})();
</script>
</body>
</html>
